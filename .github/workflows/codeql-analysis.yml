name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: 0 6 * * 1

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9e8d0789db8d0a35b1b1fe4a8f7e4448acc12573 # v3.28.15
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@9e8d0789db8d0a35b1b1fe4a8f7e4448acc12573 # v3.28.15

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@9e8d0789db8d0a35b1b1fe4a8f7e4448acc12573 # v3.28.15
