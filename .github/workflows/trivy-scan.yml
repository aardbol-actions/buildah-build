name: Trivy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: 0 5 * * 2

permissions:
  contents: read

jobs:
  scan:
    name: Filesystem scan
    runs-on: ubuntu-24.04
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install npm dependencies
        run: npm ci

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@18da67657e44ee7064b7c4ae7467d63d34eb33be # v0.31.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@9e8d0789db8d0a35b1b1fe4a8f7e4448acc12573 # v3.28.15
        with:
          sarif_file: trivy-results.sarif
